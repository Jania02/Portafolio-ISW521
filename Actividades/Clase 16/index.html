<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Asistente Frankenstein — Arquitectura Hexagonal</title>
<style>
  * { box-sizing: border-box; margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
  body { background: #f3f4f6; display: flex; justify-content: center; padding: 30px; }
  .app { width: 640px; background: #fff; border: 1px solid #e5e7eb; border-radius: 14px;
         display: flex; flex-direction: column; height: 82vh; overflow: hidden; }
  header { padding: 16px 22px; border-bottom: 1px solid #e5e7eb; display: flex;
           justify-content: space-between; align-items: flex-start; gap: 12px; }
  header h1 { font-size: 20px; color: #1f2937; }
  header p  { font-size: 12px; color: #6b7280; margin-top: 4px; }
  .offline-toggle { display: flex; align-items: center; gap: 6px; font-size: 12px;
                     color: #374151; white-space: nowrap; padding-top: 2px; }
  .offline-toggle input { width: 16px; height: 16px; cursor: pointer; }
  #chat { flex: 1; overflow-y: auto; padding: 18px 22px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 78%; padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.45; }
  .msg.user { align-self: flex-end; background: #dbeafe; }
  .msg.ia   { align-self: flex-start; background: #e5e7eb; }
  #estado { padding: 4px 22px; font-size: 12px; color: #16a34a; min-height: 22px; }
  footer { display: flex; gap: 10px; padding: 14px 22px; border-top: 1px solid #e5e7eb; }
  #entrada { flex: 1; padding: 11px 14px; border: 1px solid #b4b4be; border-radius: 12px; font-size: 14px; }
  #btnEnviar { padding: 11px 22px; border: 0; border-radius: 12px; background: #2563eb;
               color: #fff; font-weight: 700; cursor: pointer; font-size: 14px; }
  #btnEnviar:active { transform: scale(.97); }
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <h1>🤖 Asistente Frankenstein</h1>
      <p>Arquitectura Hexagonal + DDD + SOLID — Chat con memoria (localStorage) + API simulada</p>
    </div>
    <label class="offline-toggle">
      <input type="checkbox" id="modoOffline">
      🔌 Modo offline
    </label>
  </header>
  <div id="chat"></div>
  <div id="estado"></div>
  <footer>
    <input id="entrada" type="text" placeholder="Escribe tu mensaje..." autocomplete="off">
    <button id="btnEnviar">Enviar</button>
  </footer>
</div>

<!-- type="module" es obligatorio para poder usar import/export entre archivos.
     Por eso este proyecto NO se puede abrir con doble clic (file://):
     los navegadores bloquean módulos ES6 por CORS en ese protocolo.
     Hay que servirlo con un servidor local (ver README.md). -->
<script type="module" src="./src/main.js"></script>
</body>
</html>
